<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>404 — Ninaix</title>
  <style>
    :root { color-scheme: dark; --ink: #050505; --ivory: #eee8dc; --amber: #c2a47c; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100svh; display: grid; place-items: end start; padding: clamp(28px, 6vw, 80px); background: linear-gradient(90deg, rgba(5,5,5,.72), rgba(5,5,5,.2)), linear-gradient(180deg, transparent 40%, #050505), url("assets/hero-black-hole-v2.png") center / cover no-repeat, var(--ink); color: var(--ivory); font-family: Inter, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    main { max-width: 520px; }
    p { margin: 0 0 22px; color: rgba(238,232,220,.58); font-size: 12px; line-height: 1.9; letter-spacing: .05em; }
    .code { color: rgba(238,232,220,.42); font-size: 10px; letter-spacing: .32em; text-transform: uppercase; }
    h1 { margin: 16px 0 24px; font-family: Didot, "Times New Roman", serif; font-size: clamp(54px, 12vw, 132px); font-weight: 400; line-height: .85; letter-spacing: 0; }
    a { display: inline-flex; gap: 12px; padding-bottom: 10px; border-bottom: 1px solid currentColor; color: var(--ivory); font-size: 10px; letter-spacing: .2em; text-decoration: none; text-transform: uppercase; }
    a span { color: var(--amber); }
  </style>
</head>
<body>
  <main>
    <p class="code">404 / Lost signal</p>
    <h1>Ninaix</h1>
    <p>这个坐标没有对应页面。回到首页，可以继续查看 Ninaix 的个人档案与作品记录。</p>
    <a href="/">Back to archive <span>↗</span></a>
  </main>
</body>
</html>
